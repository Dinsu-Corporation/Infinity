services:
  php:
    container_name: infinity-kernel
    build:
      context: .
      dockerfile: Dockerfile
    image: dinsu/infinity:latest
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - .:/app
      - ./Caddyfile:/etc/caddy/Caddyfile
    environment:
      - CADDY_GLOBAL_OPTIONS=debug
      - APP_ENV=Dev
      - SERVER_NAME=localhost
    restart: unless-stopped
    develop:
      watch:
        - action: restart
          path: ./src
        - action: restart
          path: ./app
        - action: restart
          path: ./config

networks:
  default:
    name: infinity-network
